schema_version: 1

context:
  name: matcalc
  version: 0.4.7
  python_min: '3.11'

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/matcalc-${{ version }}.tar.gz
  sha256: 968dfed69b465b992df9c1b8f573f47448e5ffac7f0a540be8439dd7f8af6f60

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - numpy
    - setuptools >=58.0.3
    - pip
  run:
    - phono3py >=3.15.0
    - python >=${{ python_min }}
    - ase >=3.26.0
    - joblib >=1.4.2
    - phonopy >=2.38.0
    - pymatgen >=2026.3.23
    - scikit-learn >=1.6.1
    - huggingface_hub >=0.30.0
tests:
  - python:
      imports:
        - matcalc
      pip_check: true

      python_version: ${{ python_min }}.*
about:
  summary: Calculators for materials properties from the potential energy surface.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://materialsvirtuallab.github.io/matcalc

extra:
  recipe-maintainers:
    - jan-janssen
